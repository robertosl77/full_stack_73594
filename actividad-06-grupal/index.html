<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afiliación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="separador.css" rel="stylesheet">
    <link href="banner.css" rel="stylesheet">
</head>
<body class="container bg-dark text-white">

  <div class="container banner">
    <div class="borde-superior">
        <div class="punta izquierda-superior"></div>
        <div class="punta derecha-superior"></div>
    </div>
    <h1 class="text-center">Vení al Gym! 💪</h1>
    <div class="borde-inferior">
        <div class="punta izquierda-inferior"></div>
        <div class="punta derecha-inferior"></div>
    </div>
  </div>

  <fieldset class="container bg-success">
    <legend class="bg-warning text-center w-auto">🙋‍♂️ Datos Personales 👀</legend>
    <div class="container text-center p-4 w-75">
        <div class="row m-2">
          <label>Nombre:* </label>
        </div>
        <div class="row m-2">
          <input type="text" required>
        </div>
        <div class="row m-2">
          <label>Apellido:* </label>
        </div>
        <div class="row m-2">
          <input type="text" required>
        </div>
        <div class="row m-2">
          <label>Documento:* </label>
        </div>
        <div class="row m-2">
          <input type="text" required>
        </div>
        <div class="row m-2">
          <label>Nacionalidad: </label>
        </div>
        <div class="row m-2">
          <select>
              <option>Seleccionar</option>
          </select>
        </div>
        <div class="row m-2">
          <label>Contanos un poco de vos... </label>
        </div>
        <div class="row m-2">
          <textarea></textarea>
        </div>
        <div class="row m-2">
          <label>Sexo:*</label>
        </div>
        <div class="row m-2">
          <div class="col d-flex gap-3 justify-content-center"">
            <input type="radio" name="sexo" required> Femenino
            <input type="radio" name="sexo"> Masculino
            <input type="radio" name="sexo"> Otro
          </div>
        </div>
      </div>
  </fieldset>

  <div class="decoracion">
    <div></div> <div></div> <div></div> <div></div> <div></div> 
  </div>
  
  <fieldset class="bg-success">
    <legend class="bg-warning text-center w-auto">📱 Datos de Contacto 📧</legend>
    <div class="container text-center p-4 w-75">
      <div class="row m-2">
        <label>Teléfono: </label>
      </div>
      <div class="row m-2">
        <input type="text" placeholder="Código de área y número">
      </div>
      <div class="row m-2">
        <label>Dirección de correo electrónico:* </label>
      </div>
      <div class="row m-2">
        <input type="email" placeholder="Ej: mail@gmail.com" required>
      </div>        
    </div>
  </fieldset>
    
  <div class="decoracion">
    <div></div> <div></div> <div></div> <div></div> <div></div> 
  </div>
  
  <fieldset class="bg-success">
    <legend class="bg-warning text-center w-auto">🚴 Actividades 🤸‍♂️</legend>
    <div class="container p-4 w-100">
      <p>Por favor, indicá cuáles actividades te interesan.</p>
      <p>Sede Palermo:</p>
      <label><input type="checkbox"> Básquet</label>
      <label><input type="checkbox"> Boxeo</label>
      <label><input type="checkbox"> Fútbol</label>
      <label><input type="checkbox"> Tenis</label>
      <p></p>
      <p>Sede Rosario:</p>
      <label><input type="checkbox"> Básquet</label>
      <label><input type="checkbox"> Fútbol</label>
      <label><input type="checkbox"> Rugby</label>
      <label><input type="checkbox"> Voley</label>
    </div>
  </fieldset>

  <div class="mt-4">
    <div class="row">
      <label><input type="checkbox" required> Acepto las condiciones *</label>
      <label><input type="checkbox"> Deseo recibir novedades</label>
      <p>*: campo obligatorio.</p>
    </div>
  </div>
  <div class="d-flex justify-content-center gap-3 mt-3 mb-5">
    <button type="submit">Iniciar afiliación</button>
    <button type="reset">Restablecer</button>
  </div>
</body>
</html>
